<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入系統</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 95%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>系統登入</h2>
    
    <!-- [還原] 輸入使用者名稱 -->
    <input type="text" id="username" placeholder="使用者名稱" required>
    <input type="password" id="password" placeholder="密碼" required>
    
    <button onclick="login()">登入</button>
    <p id="error-msg" class="error"></p>
</div>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        if(!username || !password) {
            errorMsg.innerText = "請輸入帳號和密碼";
            errorMsg.style.display = "block";
            return;
        }

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // [還原] 傳送 username 參數
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();

            if (res.ok) {
                window.location.href = '/';
            } else {
                errorMsg.innerText = data.error || '登入失敗';
                errorMsg.style.display = "block";
            }
        } catch (e) {
            errorMsg.innerText = "連線錯誤，請稍後再試";
            errorMsg.style.display = "block";
        }
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === "Enter") login();
    });
</script>

</body>
</html>
