<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS 智慧審查系統</title>
    <!-- 引入 Bootstrap 與 FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #2c3e50; }
        .navbar-brand, .nav-link { color: white !important; }
        .card { margin-bottom: 20px; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-badge { font-size: 0.9em; padding: 5px 10px; border-radius: 20px; }
        .status-open { background-color: #ffecec; color: #c0392b; border: 1px solid #c0392b; }
        .status-closed { background-color: #e8f8f5; color: #27ae60; border: 1px solid #27ae60; }
        
        /* 隱藏類別 (用於權hn控管) */
        .role-hidden { display: none !important; }
        
        /* Loading 遮罩 */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999;
            display: none; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<!-- Loading -->
<div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<!-- 導覽列 -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"><i class="fas fa-robot me-2"></i>SMS 智慧審查系統</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('issues')">事項列表</a></li>
                <li class="nav-item" id="nav-admin" style="display:none;"><a class="nav-link" href="#" onclick="showSection('users')">使用者管理</a></li>
            </ul>
            <span class="navbar-text me-3" id="userInfo"></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">登出</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- 1. 事項列表區塊 -->
    <div id="section-issues">
        <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div class="d-flex gap-2">
                    <input type="text" id="searchInput" class="form-control" placeholder="搜尋編號或內容..." style="width: 250px;">
                    <select id="statusFilter" class="form-select" style="width: 150px;" onchange="loadIssues()">
                        <option value="">所有狀態</option>
                        <option value="列管中">列管中</option>
                        <option value="解除列管">解除列管</option>
                    </select>
                </div>
                
                <!-- 管理者功能區 -->
                <div id="managerToolbar" style="display:none;">
                    <button class="btn btn-danger" onclick="batchDeleteIssues()">
                        <i class="fas fa-trash-alt me-1"></i> 批次刪除
                    </button>
                    <label class="btn btn-success ms-2">
                        <i class="fas fa-file-excel me-1"></i> 匯入 Excel
                        <input type="file" id="excelInput" hidden accept=".xlsx, .xls" onchange="handleFileUpload(this)">
                    </label>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <!-- 批次勾選框 (只有管理者看得到) -->
                            <th width="40" class="manager-only" style="display:none;">
                                <input type="checkbox" id="selectAll" onclick="toggleAllCheckboxes()">
                            </th>
                            <th>編號</th>
                            <th>年度/單位</th>
                            <th>開立事項</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="issuesTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 2. 使用者管理區塊 (Admin Only) -->
    <div id="section-users" style="display:none;">
        <div class="card p-3">
            <div class="d-flex justify-content-between mb-3">
                <h4>使用者列表</h4>
                <button class="btn btn-primary" onclick="openUserModal()">新增使用者</button>
            </div>
            <table class="table">
                <thead><tr><th>ID</th><th>帳號/Email</th><th>名稱</th><th>權限</th><th>建立時間</th><th>操作</th></tr></thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<!-- 編輯/審查 Modal -->
<div class="modal fade" id="issueModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">事項審查</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label fw-bold">開立事項</label>
                    <div class="p-3 bg-light rounded" id="editContentDisplay"></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">狀態</label>
                        <select id="editStatus" class="form-select">
                            <option value="列管中">列管中</option>
                            <option value="解除列管">解除列管</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">審查回合</label>
                        <select id="editRound" class="form-select">
                            <option value="1">第 1 次回復</option>
                            <option value="2">第 2 次回復</option>
                            <option value="3">第 3 次回復</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">辦理情形 (營運機構)</label>
                    <textarea id="editHandling" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label">審查意見 (監理機關)</label>
                        <button class="btn btn-sm btn-warning" onclick="askAI()"><i class="fas fa-magic"></i> AI 擬搞</button>
                    </div>
                    <textarea id="editReview" class="form-control" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
                <button type="button" class="btn btn-primary" onclick="saveIssue()">儲存變更</button>
            </div>
        </div>
    </div>
</div>

<!-- 使用者 Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">使用者資訊</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="userId">
                <!-- 改為 Email/帳號 通用欄位 -->
                <div class="mb-3"><label>Email 或 帳號</label><input type="text" id="userEmail" class="form-control"></div>
                <div class="mb-3"><label>顯示名稱</label><input type="text" id="userName" class="form-control"></div>
                <div class="mb-3"><label>密碼 (若不修改請留空)</label><input type="password" id="userPass" class="form-control"></div>
                <div class="mb-3"><label>權限</label>
                    <select id="userRole" class="form-select">
                        <option value="admin">系統管理員 (Admin)</option>
                        <option value="manager">資料管理者 (Manager)</option>
                        <option value="editor">審查人員 (Editor)</option>
                        <option value="viewer">檢視人員 (Viewer)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveUser()">儲存</button>
            </div>
        </div>
    </div>
</div>

<!-- 引入 XLSX 套件 (前端讀取 Excel) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 全域變數
    let currentUser = null;
    let allIssues = [];
    const API_BASE = '/api';

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', async () => {
        await checkLogin();
        if (currentUser) {
            setupUIByRole();
            loadIssues();
            // 搜尋功能
            document.getElementById('searchInput').addEventListener('input', renderIssues);
        }
    });

    // --- 登入/權限 ---
    async function checkLogin() {
        try {
            const res = await fetch(`${API_BASE}/auth/me`);
            const data = await res.json();
            if (data.isLogin) {
                currentUser = data;
                document.getElementById('userInfo').innerText = `Hi, ${data.name} (${convertRoleToChinese(data.role)})`;
                if (data.role === 'admin') document.getElementById('nav-admin').style.display = 'block';
            } else {
                window.location.href = '/login.html';
            }
        } catch (e) { window.location.href = '/login.html'; }
    }

    function convertRoleToChinese(role) {
        const map = {
            'admin': '系統管理員',
            'manager': '資料管理者',
            'editor': '審查人員',
            'viewer': '檢視人員'
        };
        return map[role] || role;
    }

    function setupUIByRole() {
        const role = currentUser.role;
        // 如果是 admin 或 manager，顯示批次刪除和匯入
        if (['admin', 'manager'].includes(role)) {
            document.getElementById('managerToolbar').style.display = 'block';
        }
        // Admin 頁面已在 checkLogin 處理
    }

    async function logout() {
        await fetch(`${API_BASE}/auth/logout`, { method: 'POST' });
        window.location.href = '/login.html';
    }

    function showSection(id) {
        document.getElementById('section-issues').style.display = 'none';
        document.getElementById('section-users').style.display = 'none';
        document.getElementById('section-' + id).style.display = 'block';
        if(id === 'users') loadUsers();
    }

    // --- 事項管理 ---
    async function loadIssues() {
        showLoading(true);
        try {
            const res = await fetch(`${API_BASE}/issues`);
            allIssues = await res.json();
            renderIssues();
        } catch (e) { alert('載入失敗'); }
        showLoading(false);
    }

    function renderIssues() {
        const tbody = document.getElementById('issuesTableBody');
        tbody.innerHTML = '';
        const term = document.getElementById('searchInput').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;

        const filtered = allIssues.filter(i => {
            const matchText = (i.title+i.content+i.unit).toLowerCase().includes(term);
            const matchStatus = statusFilter ? i.status === statusFilter : true;
            return matchText && matchStatus;
        });

        // 權限判斷
        const canManage = ['admin', 'manager'].includes(currentUser.role); // 刪除、匯入
        const canEdit = ['admin', 'manager', 'editor'].includes(currentUser.role); // 編輯

        // 控制表頭 Checkbox 顯示
        if (canManage) {
            document.querySelectorAll('.manager-only').forEach(el => el.style.display = 'table-cell');
        }

        filtered.forEach(i => {
            const tr = document.createElement('tr');
            const badgeClass = i.status === '列管中' ? 'status-open' : 'status-closed';
            
            // 產生按鈕
            let btnHtml = '';
            if (canEdit) {
                btnHtml += `<button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal('${i.id}')">審查</button>`;
            }
            if (canManage) {
                btnHtml += `<button class="btn btn-sm btn-outline-danger" onclick="deleteIssue('${i.id}')">刪除</button>`;
            }

            // 產生 Checkbox (僅管理者)
            let checkboxHtml = '';
            if (canManage) {
                checkboxHtml = `<td class="manager-only"><input type="checkbox" class="issue-check" value="${i.id}"></td>`;
            } else {
                checkboxHtml = `<td class="manager-only" style="display:none;"></td>`;
            }

            tr.innerHTML = `
                ${checkboxHtml}
                <td>${i.title}</td>
                <td><small>${i.year}<br>${i.unit}</small></td>
                <td><div style="max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${i.content}</div></td>
                <td><span class="status-badge ${badgeClass}">${i.status}</span></td>
                <td>${btnHtml}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- 批次刪除 ---
    function toggleAllCheckboxes() {
        const master = document.getElementById('selectAll');
        document.querySelectorAll('.issue-check').forEach(cb => cb.checked = master.checked);
    }

    async function batchDeleteIssues() {
        const checked = document.querySelectorAll('.issue-check:checked');
        const ids = Array.from(checked).map(cb => cb.value);

        if (ids.length === 0) return alert('請先勾選要刪除的項目');
        if (!confirm(`確定要刪除這 ${ids.length} 筆資料嗎？此動作無法復原！`)) return;

        showLoading(true);
        try {
            const res = await fetch(`${API_BASE}/issues/batch-delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids })
            });
            const result = await res.json();
            if (result.success) {
                alert('刪除成功');
                loadIssues();
                document.getElementById('selectAll').checked = false; // 重置
            } else {
                alert('刪除失敗: ' + result.error);
            }
        } catch(e) { alert('系統錯誤'); }
        showLoading(false);
    }

    async function deleteIssue(id) {
        if(!confirm('確定刪除？')) return;
        await fetch(`${API_BASE}/issues/${id}`, { method: 'DELETE' });
        loadIssues();
    }

    // --- 編輯/審查 ---
    let currentEditIssue = null;
    function openEditModal(id) {
        currentEditIssue = allIssues.find(i => i.id === id);
        if (!currentEditIssue) return;

        document.getElementById('editId').value = id;
        document.getElementById('editContentDisplay').innerText = currentEditIssue.content;
        document.getElementById('editStatus').value = currentEditIssue.status || '列管中';
        document.getElementById('editRound').value = '1';
        
        // 載入第一回合資料
        loadRoundData(1); 
        
        // 監聽回合切換
        document.getElementById('editRound').onchange = (e) => loadRoundData(e.target.value);

        new bootstrap.Modal(document.getElementById('issueModal')).show();
    }

    function loadRoundData(round) {
        const suffix = round == 1 ? '' : round;
        document.getElementById('editHandling').value = currentEditIssue['handling'+suffix] || '';
        document.getElementById('editReview').value = currentEditIssue['review'+suffix] || '';
    }

    async function saveIssue() {
        const id = document.getElementById('editId').value;
        const round = document.getElementById('editRound').value;
        const status = document.getElementById('editStatus').value;
        const handling = document.getElementById('editHandling').value;
        const review = document.getElementById('editReview').value;

        await fetch(`${API_BASE}/issues/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status, round, handling, review })
        });
        
        bootstrap.Modal.getInstance(document.getElementById('issueModal')).hide();
        loadIssues();
    }

    // --- AI 功能 ---
    async function askAI() {
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';

        const content = document.getElementById('editContentDisplay').innerText;
        const handling = document.getElementById('editHandling').value;
        
        if (!handling) { alert('請先輸入辦理情形'); btn.disabled = false; btn.innerHTML = originalText; return; }

        try {
            const res = await fetch(`${API_BASE}/gemini`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, rounds: handling })
            });
            const data = await res.json();
            if (data.reason) {
                document.getElementById('editReview').value = data.reason;
            } else {
                alert('AI 無法生成回應');
            }
        } catch (e) { alert('AI 連線錯誤'); }
        
        btn.disabled = false; btn.innerHTML = originalText;
    }

    // --- Excel 匯入 ---
    async function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;
        
        // 只有 admin 或 manager 可以匯入
        if (!['admin', 'manager'].includes(currentUser.role)) {
            alert('權限不足'); return;
        }

        showLoading(true);
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 }); // 讀取為陣列陣列

            // 簡單解析邏輯 (假設第一行是標題)
            const parsed = [];
            // 略過標題列，從第 2 列開始
            for (let i = 1; i < jsonData.length; i++) {
                const row = jsonData[i];
                if (row.length > 0) {
                    parsed.push({
                        year: row[0] || '',
                        unit: row[1] || '',
                        number: row[2] || '', // 假設這是編號/Title
                        content: row[3] || '',
                        status: row[4] || '列管中',
                        handling: row[5] || '', // 匯入時也可帶入辦理情形
                        review: row[6] || ''    // 匯入時也可帶入審查意見
                    });
                }
            }

            // 發送給後端
            await fetch(`${API_BASE}/issues/import`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: parsed, round: 1 })
            });

            alert('匯入完成');
            loadIssues();
            input.value = ''; // 重置 input
            showLoading(false);
        };
        reader.readAsArrayBuffer(file);
    }

    // --- 使用者管理 ---
    async function loadUsers() {
        const res = await fetch(`${API_BASE}/users`);
        const users = await res.json();
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';
        users.forEach(u => {
            tbody.innerHTML += `
                <tr>
                    <td>${u.id}</td>
                    <td>
                        <div>${u.username || ''}</div>
                        <small class="text-muted">${u.email || ''}</small>
                    </td>
                    <td>${u.name || '-'}</td>
                    <td>${u.role_display || u.role}</td> <!-- 顯示中文職稱 -->
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="openUserModal('${u.id}', '${u.username||''}', '${u.email||''}', '${u.name||''}', '${u.role}')">編輯</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${u.id}')">刪除</button>
                    </td>
                </tr>
            `;
        });
    }

    function openUserModal(id='', username='', email='', name='', role='viewer') {
        document.getElementById('userId').value = id;
        // 如果有 email 顯示 email，否則顯示 username
        document.getElementById('userEmail').value = email || username; 
        document.getElementById('userName').value = name;
        document.getElementById('userPass').value = '';
        document.getElementById('userRole').value = role;
        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    async function saveUser() {
        const id = document.getElementById('userId').value;
        const inputVal = document.getElementById('userEmail').value; // 這是 Username 或 Email
        const name = document.getElementById('userName').value;
        const password = document.getElementById('userPass').value;
        const role = document.getElementById('userRole').value;

        // 判斷 inputVal 是 email 還是 username
        let payload = { name, role, password };
        if (inputVal.includes('@')) {
            payload.email = inputVal;
        } else {
            payload.username = inputVal;
        }

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API_BASE}/users/${id}` : `${API_BASE}/users`;

        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
            loadUsers();
        } else {
            const err = await res.json();
            alert(err.error || '失敗');
        }
    }

    async function deleteUser(id) {
        if(!confirm('確定刪除？')) return;
        await fetch(`${API_BASE}/users/${id}`, { method: 'DELETE' });
        loadUsers();
    }

    function showLoading(show) {
        document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }
</script>

</body>
</html>
