<!-- index.html，完全保留原本所有功能與風格，並新增 plansView 及互動 JS（融入 main-content & script） -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
    <title>SMS開立事項查詢與AI審查系統</title>
    <!-- ... 保留原樣，略 ... -->
    <!-- 省略原始 style，請用你的原始 index.html style 內容 -->
</head>
<body>
    <!-- ... 省略 header, sidebar ... -->
    <aside class="filters-panel" id="filtersPanel">
        <div class="sidebar-header">
            <div class="sidebar-title">功能選單</div>
            <button class="sidebar-close-btn" onclick="onToggleSidebar()">×</button>
        </div>
        <button class="sidebar-btn active" id="btn-searchView" onclick="switchView('searchView')"><span>📊</span> 查詢看板</button>
        <button class="sidebar-btn hidden" id="btn-importView" onclick="switchView('importView')"><span>📂</span> 資料管理</button>
        <button class="sidebar-btn hidden" id="btn-usersView" onclick="switchView('usersView')"><span>👥</span> 帳號管理</button>
        <!-- 新增：計畫管理 -->
        <button class="sidebar-btn" id="btn-plansView" onclick="switchView('plansView')"><span>🗂</span> 檢查計畫管理</button>
    </aside>
    <!-- ... 省略 filterBackdrop、main-content ... -->

    <main class="main-content">
        <!-- ... 既有 view-section 區 ... -->
        <!-- 新增/融入 PlansView -->
        <div id="plansView" class="view-section hidden">
            <div class="content-header">
                <div class="content-title">🗂 檢查計畫事項管理</div>
                <button class="btn btn-primary" onclick="openPlanModal()">➕ 新增計畫</button>
            </div>
            <div class="main-card" style="margin-bottom:28px;">
                <div style="padding:18px; border-bottom:1px solid #e2e8f0; display:flex; gap:12px; align-items:center;">
                    <input type="text" id="planSearch" class="filter-input" placeholder="搜尋計畫..." style="max-width:240px;" oninput="loadPlanList(1)">
                    <select id="planYearSelect" class="filter-select" style="width:120px;"></select>
                    <button class="btn btn-outline" onclick="loadPlanList(1)">🔍 查詢</button>
                </div>
                <div id="planListBar" class="pagination-bar" style="padding:10px; border-bottom:1px solid #eee; justify-content: flex-end;"></div>
                <div class="data-container" style="min-height: 140px;">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:220px;">檢查計畫</th>
                                <th style="width:100px">年度</th>
                                <th style="width:100px">開立事項數</th>
                                <th style="width:150px">最後更新</th>
                                <th style="width:120px">管理</th>
                            </tr>
                        </thead>
                        <tbody id="planTableBody"></tbody>
                    </table>
                </div>
            </div>
            <div id="planDetailSection" class="main-card hidden" style="padding:28px;">
                <div style="font-weight:700; font-size:18px; margin-bottom:18px;">
                    <span id="planDetailName"></span>
                    <span style="font-size:13px; color:#888;" id="planDetailYear"></span>
                </div>
                <div style="color:#64748b; margin-bottom:16px;">
                    <span id="planDetailCount">0</span> 筆事項
                    <span style="margin-left:16px;">最後更新：<span id="planDetailUpdate"></span></span>
                </div>
                <button class="btn btn-primary" style="margin-bottom:14px;" onclick="openIssueModal()">➕ 新增本計畫事項</button>
                <div class="data-container">
                    <table>
                        <thead>
                            <tr>
                                <th>編號</th>
                                <th>狀態</th>
                                <th>事項內容</th>
                                <th>管理</th>
                            </tr>
                        </thead>
                        <tbody id="planIssuesBody"></tbody>
                    </table>
                </div>
                <button class="btn btn-outline" style="margin-top:28px;" onclick="closePlanDetail()">⬅️ 返回計畫列表</button>
            </div>
            <!-- 計畫新增 Modal -->
            <div class="modal-overlay" id="planModal">
                <div class="modal-box">
                    <h3 id="planModalTitle">新增計畫</h3>
                    <div class="form-group"><label>計畫名稱</label><input type="text" id="planModalName" class="filter-input"></div>
                    <div class="form-group"><label>年度</label><input type="number" id="planModalYear" class="filter-input" min="100" max="999"></div>
                    <div style="display:flex;gap:10px;"><button class="btn btn-primary" onclick="submitPlanModal()">送出</button><button class="btn btn-outline" onclick="closePlanModal()">取消</button></div>
                </div>
            </div>
            <!-- 事項新增 Modal -->
            <div class="modal-overlay" id="issueModal">
                <div class="modal-box">
                    <h3 id="issueModalTitle">新增開立事項</h3>
                    <div class="form-group"><label>事項編號</label><input type="text" id="issueModalNumber" class="filter-input"></div>
                    <div class="form-group"><label>事項內容</label><textarea id="issueModalContent" class="filter-input" rows="5"></textarea></div>
                    <div class="form-group"><label>狀態</label>
                        <select id="issueModalStatus" class="filter-select">
                            <option value="持續列管">持續列管</option>
                            <option value="解除列管">解除列管</option>
                            <option value="自行列管">自行列管</option>
                        </select>
                    </div>
                    <div style="display:flex;gap:10px;">
                        <button class="btn btn-primary" onclick="submitIssueModal()">送出</button>
                        <button class="btn btn-outline" onclick="closeIssueModal()">取消</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- ... 其他 view-section(searchView/importView/usersView)原樣保留 ... -->
    </main>

    <!-- ... 保留原 modal、drawer, toast ... -->
    <script>
    // ... 原有 JS 內容 ...
    // 新增 plansView 功能，**完全不影響原全域變數**
    let plansData = [], plansPage = 1, plansPageSize = 15, plansTotal = 0, plansPages = 1, currentPlan = null, planIssues = [];
    async function loadPlanList(page=1) {
        plansPage = page;
        const search = document.getElementById('planSearch').value || '';
        const year = document.getElementById('planYearSelect').value || '';
        try {
            const params = new URLSearchParams({ q: search, year, page: plansPage, pageSize: plansPageSize, _t: Date.now() });
            const res = await fetch('/api/options/plans_details?' + params.toString());
            const j = await res.json();
            plansData = j.data || [];
            plansTotal = j.total || 0;
            plansPages = j.pages || 1;
            renderPlansTable();
            renderPagination('planListBar', plansPage, plansPages, 'loadPlanList');
            const years = [...new Set(plansData.map(x => x.year).filter(Boolean))];
            document.getElementById('planYearSelect').innerHTML = '<option value="">全部年度</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
        } catch(e) {
            showToast('載入計畫失敗', 'error');
        }
    }
    function renderPlansTable() {
        const tbody = document.getElementById('planTableBody');
        tbody.innerHTML = plansData.map(p => `<tr>
            <td>${p.plan_name}</td>
            <td>${p.year}</td>
            <td>${p.issues_count || 0}</td>
            <td>${p.updated_at ? new Date(p.updated_at).toLocaleDateString() : '-'}</td>
            <td><button class="btn btn-outline btn-sm" onclick="openPlanDetail('${p.plan_name}', '${p.year}')">管理事項</button></td>
        </tr>`).join('');
    }
    async function openPlanDetail(planName, year) {
        try {
            const params = new URLSearchParams({ planName, year, pageSize: 100 });
            const res = await fetch('/api/issues?' + params.toString());
            const j = await res.json();
            planIssues = j.data || [];
            currentPlan = { planName, year, updated_at: j.latestCreatedAt, issues_count: planIssues.length };
            document.getElementById('planDetailName').textContent = planName;
            document.getElementById('planDetailYear').textContent = year + ' 年';
            document.getElementById('planDetailCount').textContent = planIssues.length;
            document.getElementById('planDetailUpdate').textContent = currentPlan.updated_at ? new Date(currentPlan.updated_at).toLocaleString('zh-TW') : '-';
            document.getElementById('planDetailSection').classList.remove('hidden');
            renderPlanIssues();
        } catch(e) {
            showToast('計畫事項載入失敗', 'error');
        }
    }
    function renderPlanIssues() {
        const tbody = document.getElementById('planIssuesBody');
        tbody.innerHTML = planIssues.map(issue => `
            <tr>
                <td>${issue.number}</td>
                <td><span class="badge ${issue.status==='持續列管'?'active':(issue.status==='解除列管'?'resolved':'self')}">${issue.status}</span></td>
                <td><div style="max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${stripHtml(issue.content).slice(0,80)}</div></td>
                <td>
                    <button class="btn btn-outline btn-sm" onclick="editIssueFromPlan('${issue.id}')">✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteIssueFromPlan('${issue.id}')">🗑️</button>
                </td>
            </tr>
        `).join('');
    }
    function closePlanDetail(){ document.getElementById('planDetailSection').classList.add('hidden'); }
    function openPlanModal() {
        document.getElementById('planModalTitle').innerText = '新增計畫';
        document.getElementById('planModalName').value = '';
        document.getElementById('planModalYear').value = '';
        document.getElementById('planModal').classList.add('open');
    }
    function closePlanModal(){ document.getElementById('planModal').classList.remove('open'); }
    async function submitPlanModal(){
        const name = document.getElementById('planModalName').value.trim();
        const year = document.getElementById('planModalYear').value.trim();
        if (!name || !year) return showToast('請填完整計畫', 'error');
        try {
            const res = await fetch('/api/options/plans', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({plan_name:name, year})});
            if(res.ok) {showToast('已新增計畫'); closePlanModal(); loadPlanList(1);}
            else showToast('新增計畫失敗','error');
        } catch(e){ showToast('連線錯誤','error'); }
    }
    function openIssueModal() {
        document.getElementById('issueModalTitle').innerText = '新增開立事項';
        document.getElementById('issueModalNumber').value = '';
        document.getElementById('issueModalContent').value = '';
        document.getElementById('issueModalStatus').value = '持續列管';
        document.getElementById('issueModal').classList.add('open');
    }
    function closeIssueModal(){ document.getElementById('issueModal').classList.remove('open'); }
    async function submitIssueModal() {
        if(!currentPlan) return;
        const num = document.getElementById('issueModalNumber').value.trim();
        const content = document.getElementById('issueModalContent').value.trim();
        const status = document.getElementById('issueModalStatus').value;
        if(!num || !content) return showToast('請填完整事項', 'error');
        try {
            const payload = { data:[{number:num, content, status, planName:currentPlan.planName, year:currentPlan.year}], round:1, reviewDate:'', replyDate:'' };
            const res = await fetch('/api/issues/import', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
            if(res.ok){ showToast('事項新增成功'); closeIssueModal(); openPlanDetail(currentPlan.planName, currentPlan.year);}
            else showToast('新增失敗','error');
        } catch(e){ showToast('連線錯誤','error'); }
    }
    function editIssueFromPlan(id) { openDetail(id, true); }
    async function deleteIssueFromPlan(id) {
        if(!confirm('真的要刪除此事項？')) return;
        try {
            const res = await fetch(`/api/issues/${id}`, {method:'DELETE'});
            if(res.ok){ showToast('已刪除'); openPlanDetail(currentPlan.planName, currentPlan.year);}
            else showToast('刪除失敗','error');
        } catch(e){ showToast('連線錯誤','error'); }
    }
    document.getElementById('btn-plansView').addEventListener('click', () => { loadPlanList(1); });
    // ... 其他原本script內容保留 ...
    </script>
</body>
</html>
