<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS AI Review System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        p { font-size: 1.2em; margin-bottom: 30px; opacity: 0.9; }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }
        .btn-primary { background: white; color: #2c3e50; }
        .btn-primary:hover { background: #ecf0f1; transform: scale(1.05); }
        
        .btn-outline { border: 2px solid white; color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        .loading { font-size: 0.9em; opacity: 0.7; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SMS AI Review</h1>
    <p>智慧化審查管理系統</p>

    <div id="actionArea">
        <div class="loading">檢查身分中...</div>
    </div>
</div>

<script>
    // 頁面載入時檢查登入狀態
    document.addEventListener('DOMContentLoaded', async () => {
        const actionArea = document.getElementById('actionArea');
        
        try {
            const res = await fetch('/api/auth/me');
            const data = await res.json();

            if (data.isLogin) {
                // 已登入
                actionArea.innerHTML = `
                    <p>歡迎回來，${data.name} (${data.role})</p>
                    <a href="/dashboard.html" class="btn btn-primary">進入管理儀表板</a>
                    <br>
                    <a href="#" onclick="logout()" style="color:white; font-size:0.8em; margin-top:15px; display:inline-block;">登出</a>
                `;
            } else {
                // 未登入
                actionArea.innerHTML = `
                    <a href="/login.html" class="btn btn-primary">使用者登入</a>
                `;
            }
        } catch (e) {
            actionArea.innerHTML = `<p style="color:#ffcccc">系統連線異常</p>`;
        }
    });

    async function logout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.reload();
    }
</script>

</body>
</html>
