<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>資料匯入系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
        .note { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>批次匯入資料 (僅限管理員)</h2>
    <p class="note">請貼上轉換好的 JSON 資料格式，例如：[{"title":"測試事項","content":"內容說明","status":"Open"}]</p>
    
    <textarea id="jsonInput" placeholder="在此貼上 JSON 資料..."></textarea>
    <br>
    <button onclick="uploadData()">匯入資料庫</button>
    <p id="status"></p>

    <hr>
    
    <h3>現有資料列表</h3>
    <button onclick="loadIssues()" style="background:#007bff;">重新整理列表</button>
    <ul id="issueList"></ul>
</div>

<script>
    // 1. 匯入功能
    async function uploadData() {
        const input = document.getElementById('jsonInput').value;
        const status = document.getElementById('status');
        
        try {
            const jsonData = JSON.parse(input); // 解析使用者貼上的 JSON
            
            // 呼叫後端 API
            const res = await fetch('/api/issues/import', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: jsonData })
            });
            
            const result = await res.json();
            
            if (res.ok) {
                status.innerText = result.message;
                status.style.color = 'green';
                loadIssues(); // 成功後刷新列表
            } else {
                status.innerText = '錯誤：' + result.error;
                status.style.color = 'red';
            }
        } catch (e) {
            status.innerText = 'JSON 格式錯誤，請檢查內容';
            status.style.color = 'red';
        }
    }

    // 2. 讀取列表功能
    async function loadIssues() {
        const list = document.getElementById('issueList');
        list.innerHTML = '載入中...';
        
        try {
            const res = await fetch('/api/issues');
            if (res.status === 401) {
                list.innerHTML = '請先 <a href="/login.html">登入</a>';
                return;
            }
            
            const issues = await res.json();
            list.innerHTML = '';
            
            issues.forEach(issue => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <strong>${issue.title}</strong> (${issue.status}) 
                    <br><small>建立者: ${issue.created_by} | 時間: ${new Date(issue.created_at).toLocaleString()}</small>
                    <p>${issue.content}</p>
                    <button onclick="deleteIssue(${issue.id})" style="background:red; font-size:0.8em; padding:5px;">刪除</button>
                    <hr>
                `;
                list.appendChild(li);
            });
        } catch (err) {
            list.innerText = '載入失敗';
        }
    }

    // 3. 刪除功能
    async function deleteIssue(id) {
        if(!confirm('確定要刪除嗎？')) return;
        
        const res = await fetch('/api/issues/' + id, { method: 'DELETE' });
        const result = await res.json();
        
        if(res.ok) {
            alert('刪除成功');
            loadIssues();
        } else {
            alert('刪除失敗: ' + result.error);
        }
    }

    // 頁面載入時自動讀取
    loadIssues();
</script>

</body>
</html>
